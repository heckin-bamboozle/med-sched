<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Med Tracker{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3b82f6">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <nav class="bg-blue-600 p-4 text-white shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">💊 Family Meds</h1>
            {% if user %}
                <span class="text-sm">Hi, {{ user.name }}</span>
            {% endif %}
        </div>
    </nav>
    <main class="container mx-auto p-4 max-w-md md:max-w-2xl">
        {% block content %}{% endblock %}
    </main>
    <script>
        // Simple Service Worker Registration for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/js/sw.js');
        }
    </script>
</body>
</html>
